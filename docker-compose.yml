services:
  db:
    image: postgres:15-alpine
    container_name: phishing_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: phishing_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: phishing_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/phishing_db
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: phishing_mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /tmp/mlflow-artifacts

  frontend:
    image: python:3.10-slim
    container_name: phishing_frontend
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install streamlit httpx matplotlib seaborn pandas &&
      streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
